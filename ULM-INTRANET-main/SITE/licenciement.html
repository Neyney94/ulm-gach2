<body class="contract-body">

<!-- FLECHE RETOUR -->
<div class="back-arrow" onclick="goBack()">
    ← Retour
</div>

<div class="contract-container">

    <div class="contract-form">

        <h1 class="contract-title">DEMANDE DE LICENCIEMENT</h1>

        <form id="licenciementForm">

            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="nom" required>
            </div>

            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="prenom" required>
            </div>

            <div class="form-group">
                <label>Poste</label>
                <input type="text" id="poste" required>
            </div>

            <div class="form-group">
                <label>Date d'arrivée</label>
                <input type="date" id="arrivee" required>
            </div>

            <div class="form-group">
                <label>Raison du licenciement</label>
                <textarea id="raison" rows="4" required></textarea>
            </div>

            <button type="submit" class="modern-btn">
                Envoyer la demande
            </button>

        </form>

    </div>

</div>

<script>

/* ================= PROTECTION LOGIN ================= */

const currentUser = JSON.parse(localStorage.getItem("ulmUser"));
if (!currentUser) {
    window.location.href = "/";
}

/* ================= RETOUR ================= */

function goBack() {
    window.location.href = "dashboard.html";
}

/* ================= ENVOI MYSQL ================= */

document.getElementById("licenciementForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const nouvelleDemande = {
        nom: document.getElementById("nom").value,
        prenom: document.getElementById("prenom").value,
        poste: document.getElementById("poste").value,
        arrivee: document.getElementById("arrivee").value,
        raison: document.getElementById("raison").value
    };

    try {

        const response = await fetch("api/add_licenciement.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nouvelleDemande)
        });

        const result = await response.json();

        if (result.success) {

            if (typeof sendLog === "function") {
                sendLog(
                    "Nouvelle demande licenciement",
                    nouvelleDemande.nom + " " + nouvelleDemande.prenom +
                    " | Poste: " + nouvelleDemande.poste
                );
            }

            alert("Demande de licenciement envoyée !");
            this.reset();
            window.location.href = "dashboard.html";

        } else {
            alert("Erreur : " + (result.error || "Envoi impossible"));
        }

    } catch (error) {
        console.error("Erreur :", error);
        alert("Erreur serveur.");
    }

});

</script>

<script src="logs.js"></script>

</body>
</html>
