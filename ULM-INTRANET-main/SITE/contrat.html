<body class="contract-body">

<!-- FLECHE RETOUR -->
<div class="back-arrow" onclick="goBack()">
    ← Retour
</div>

<div class="contract-container">

    <div class="contract-form">

        <h1 class="contract-title">DEMANDE DE CONTRAT RH</h1>

        <form id="contractForm">

            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="nom" required>
            </div>

            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="prenom" required>
            </div>

            <div class="form-group">
                <label>Pseudo artiste</label>
                <input type="text" id="pseudo" required>
            </div>

            <div class="form-group">
                <label>Poste de l'employé</label>
                <input type="text" id="poste" required>
            </div>

            <div class="form-group">
                <label>Date de naissance</label>
                <input type="date" id="date" required>
            </div>

            <button type="submit" class="modern-btn">
                Envoyer la demande
            </button>

        </form>

    </div>

</div>

<script>

/* ================= PROTECTION LOGIN ================= */

const currentUser = JSON.parse(localStorage.getItem("ulmUser"));

if (!currentUser) {
    window.location.href = "/";
}

/* ================= RETOUR ================= */

function goBack() {
    window.location.href = "dashboard.html";
}

/* ================= ENVOI FORMULAIRE MYSQL ================= */

document.getElementById("contractForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const nouvelleDemande = {
        nom: document.getElementById("nom").value,
        prenom: document.getElementById("prenom").value,
        pseudo: document.getElementById("pseudo").value,
        poste: document.getElementById("poste").value,
        date_naissance: document.getElementById("date").value
    };

    try {

        const response = await fetch("api/add_contrat.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nouvelleDemande)
        });

        const result = await response.json();

        if (result.success) {

            if (typeof sendLog === "function") {
                sendLog(
                    "Nouvelle demande contrat",
                    nouvelleDemande.nom + " " + nouvelleDemande.prenom +
                    " | Poste: " + nouvelleDemande.poste
                );
            }

            alert("Demande envoyée avec succès !");
            this.reset();
            window.location.href = "dashboard.html";

        } else {
            alert("Erreur : " + (result.error || "Envoi impossible"));
        }

    } catch (error) {
        console.error("Erreur:", error);
        alert("Erreur serveur.");
    }

});

</script>

<script src="logs.js"></script>

</body>
</html>
