<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=W0yWGGn3s4IE3xWdgyi14o2Kes12BKzFaMvGgy_Et763lVXKzr1uFxd4BYwG7TLOC9d9jFdm519kXz1EcC6nZkaeJ4hZfr6eWNuPeBJQqW4RkvaXaRQxvoRjU2EVu_0W3EBmyWC0yFgAjcPW7HX1qqM0HIHkahsE_0GCIMwA-f6UWV67NoVXwZyQrEelrw0E" charset="UTF-8"></script><link rel="stylesheet" crossorigin="anonymous" href="https://gc.kis.v2.scr.kaspersky-labs.com/E3E8934C-235A-4B0E-825A-35A08381A191/abn/main.css?attr=aHR0cHM6Ly93ZWIwMS55b3JraG9zdC5mcjoyMDgzL2Nwc2VzczU2ODQyMjI5MzQvZG93bmxvYWQ_c2tpcGVuY29kZT0xJmZpbGU9JTJmaG9tZSUyZnVsbXJlY29yJTJmcHVibGljX2h0bWwlMmZyZWNlcHRpb24uaHRtbA"/></head>

<body>

<div class="sidebar">
    <h2 class="sidebar-title">
        <img src="logo.png" alt="ULM Logo" class="sidebar-logo">
        ULM
    </h2>

    <a href="dashboard.html">Accueil</a>
    <a href="contrat.html">Demande de contrat</a>
    <a href="employes.html">Créer un employé</a>
    <a href="licenciement.html">Licenciement</a>
    <a href="reception.html">Reception RH</a>
    <a href="classement-admin.html">Classement</a>
    <a href="admin-rh.html">Admin</a>
    <a href="events.html">Events</a>

    <button class="sidebar-logout" onclick="logout()">Déconnexion</button>
</div>

<div class="main">

    <h1>Réception RH</h1>

    <!-- ================= CONTRATS ================= -->

    <div class="employee-list">
        <h2>📄 Demandes de Contrat</h2>
        <div id="contratContainer"></div>
    </div>

    <!-- ================= LICENCIEMENTS ================= -->

    <div class="employee-list">
        <h2>🚨 Demandes de Licenciement</h2>
        <div id="licenciementContainer"></div>
    </div>

</div>

<script>

/* ================= PROTECTION LOGIN ================= */

const currentUser = JSON.parse(localStorage.getItem("ulmUser"));

if (!currentUser) {
    window.location.href = "/";
}

if (currentUser.role === "Manager") {
    window.location.href = "dashboard.html";
}

/* ================= CONTRATS ================= */

async function loadContrats() {

    try {

        const res = await fetch("api/get_contrats.php");
        const contrats = await res.json();

        const container = document.getElementById("contratContainer");
        container.innerHTML = "";

        if (!Array.isArray(contrats) || contrats.length === 0) {
            container.innerHTML = "<p style='color:#777;'>Aucune demande.</p>";
            return;
        }

        contrats.forEach(c => {

            container.innerHTML += `
                <div class="employee-card">
                    <p><strong>${c.nom} ${c.prenom}</strong></p>
                    <p>Pseudo : ${c.pseudo}</p>
                    <p>Poste : ${c.poste}</p>
                    <p>Date demande : ${c.date_demande}</p>

                    <div class="employee-actions">
                        <button class="edit-btn" onclick="updateContrat(${c.id}, 'accepte')">
                            ✅ Accepter
                        </button>
                        <button class="delete-btn" onclick="updateContrat(${c.id}, 'refuse')">
                            ❌ Refuser
                        </button>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.error("Erreur chargement contrats :", error);
    }
}

async function updateContrat(id, statut) {

    try {

        const res = await fetch("api/update_statut.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, statut })
        });

        const result = await res.json();

        if (result.success) {
            loadContrats();
        } else {
            alert("Erreur mise à jour contrat");
        }

    } catch (error) {
        console.error(error);
    }
}

/* ================= LICENCIEMENTS ================= */

async function loadLicenciements() {

    try {

        const res = await fetch("api/get_licenciements.php");
        const licenciements = await res.json();

        const container = document.getElementById("licenciementContainer");
        container.innerHTML = "";

        if (!Array.isArray(licenciements) || licenciements.length === 0) {
            container.innerHTML = "<p style='color:#777;'>Aucune demande.</p>";
            return;
        }

        licenciements.forEach(l => {

            container.innerHTML += `
                <div class="employee-card">
                    <p><strong>${l.nom} ${l.prenom}</strong></p>
                    <p>Poste : ${l.poste}</p>
                    <p>Raison : ${l.raison}</p>
                    <p>Date demande : ${l.date_demande}</p>

                    <div class="employee-actions">
                        <button class="edit-btn" onclick="updateLicenciement(${l.id}, 'accepte')">
                            ✅ Valider
                        </button>
                        <button class="delete-btn" onclick="updateLicenciement(${l.id}, 'refuse')">
                            ❌ Refuser
                        </button>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.error("Erreur chargement licenciements :", error);
    }
}

async function updateLicenciement(id, statut) {

    try {

        const res = await fetch("api/update_licenciement_statut.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, statut })
        });

        const result = await res.json();

        if (result.success) {
            loadLicenciements();
        } else {
            alert("Erreur mise à jour licenciement");
        }

    } catch (error) {
        console.error(error);
    }
}

/* ================= LOGOUT ================= */

function logout() {
    localStorage.removeItem("ulmUser");
    window.location.href = "index.html";
}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", function() {
    loadContrats();
    loadLicenciements();
});

</script>

<script src="logs.js"></script>

</body>
</html>
